pluginManagement {
	repositories {
		mavenLocal()

		file('buildSrc/config/maven/repositories.txt')
			.readLines()
			.forEach { line ->
				line = line.trim()
				if (!line.isBlank() && !line.startsWith('#')) {
					maven { url = uri(line.trim()); allowInsecureProtocol = true }
				}
			}

		gradlePluginPortal()
		mavenCentral()
		google()
	}
}

plugins {
	id 'io.spring.dependency-management' version "$dependencyManagementPluginVersion" apply false
}

dependencyResolutionManagement {
	repositories {
		mavenLocal()

		file('buildSrc/config/maven/repositories.txt')
			.readLines()
			.forEach { line ->
				line = line.trim()
				if (!line.isBlank() && !line.startsWith('#')) {
					maven { url = uri(line.trim()); allowInsecureProtocol = true }
				}
			}

		mavenCentral()
		google()
	}
}

// root project
rootProject.name = 'spring-turbocharger'

// sub-projects
['projects-main', 'projects-example'].forEach { dirName ->
	includeSubprojects(file(dirName))
}

// tools
private def includeSubprojects(File directory) {
	if (directory == null || !directory.isDirectory()) {
		return
	}

	directory.listFiles(new FileFilter() {
		@Override
		boolean accept(File f) {
			return f.isDirectory()
		}
	})
		.each { subDir ->
			for (var subSubFile : subDir.listFiles()) {
				if (subSubFile.isFile() || subSubFile.name == 'build.gradle') {
					include("${directory.name}:${subDir.name}")
					break
				}
			}
		}
}
