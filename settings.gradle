pluginManagement {
	repositories {
		mavenLocal()

		try (var reader = file('buildSrc/config/maven/repositories.txt').newReader()) {
			reader.lines()
				.forEach { line ->
					var mirror = line.trim()
					if (!mirror.isBlank()) {
						maven { url = uri(mirror); allowInsecureProtocol = true }
					}
				}
		}

		gradlePluginPortal()
		mavenCentral()
		google()
	}
}

plugins {
	id 'io.spring.dependency-management' version "${dependencyManagementPluginVersion}" apply false
}

dependencyResolutionManagement {
	repositories {
		mavenLocal()

		try (var reader = file('buildSrc/config/maven/repositories.txt').newReader()) {
			reader.lines()
				.forEach { line ->
