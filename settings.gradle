pluginManagement {
	repositories {
		mavenLocal()
		gradlePluginPortal()
		maven { name = '腾讯云'; url = 'https://mirrors.cloud.tencent.com/nexus/repository/maven-public/' }
		maven { name = '阿里云'; url = 'https://maven.aliyun.com/repository/gradle-plugin' }
		maven { name = '华为云'; url = 'https://repo.huaweicloud.com/repository/maven/' }
		maven { name = '网易云'; url = 'https://mirrors.163.com/maven/repository/maven-public/' }
		mavenCentral()
	}
}

plugins {
	id 'io.spring.dependency-management' version '1.1.7' apply false
}

dependencyResolutionManagement {
	repositories {
		mavenLocal()
		maven { name = '腾讯云'; url = 'https://mirrors.cloud.tencent.com/nexus/repository/maven-public/' }
		maven { name = '阿里云'; url = 'https://maven.aliyun.com/repository/public/' }
		maven { name = '华为云'; url = 'https://repo.huaweicloud.com/repository/maven/' }
		maven { name = '网易云'; url = 'https://mirrors.163.com/maven/repository/maven-public/' }
		maven { name = 'Spring(GA)'; url = 'https://repo.spring.io/release' }
		maven { name = 'Spring(Milestone)'; url = 'https://repo.spring.io/milestone' }
		maven { name = 'Spring(Snapshot)'; url = 'https://repo.spring.io/snapshot' }
		mavenCentral()
	}
}

rootProject.name = 'spring-turbocharger'

// 核心子项目
file("${rootDir}/projects-main").eachDirMatch(~/spring-turbo.*/) {
	include("projects-main:${it.name}")
}

// 演示子项目
file("${rootDir}/projects-example").eachDirMatch(~/.*/) {
	include("projects-example:${it.name}")
}
