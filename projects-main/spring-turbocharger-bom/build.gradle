//file:noinspection ForeignDelegate
plugins {
	id 'java-platform'
	id 'signing'
	id 'maven-publish'
}

dependencies {
	constraints {
		rootProject.findProject('projects-main').subprojects { subproject ->
			if (subproject.name.startsWith('spring-turbo-')) {
				api(subproject)
			}
		}

		// hocon
		api(libs.hocon)

		// bouncy castle
		api(libs.bundles.bouncycastle)

		// jwt
		api(libs.bundles.jjwt)

		// zxing
		api(libs.bundles.zxing)

		// hutool
		api(libs.hutool.all)

		// freemarker
		api(libs.freemarker)

		// pinyin4j
		api(libs.pinyin4j)
	}
}

publishing {

	publications {
		mavenJava(MavenPublication) {
			from components.javaPlatform

			groupId = 'com.github.yingzhuo'
			artifactId = "${project.name}"
			version = "${project.version}"

			pom {
				name = "${project.name}"
				description = 'BOM of SpringTurbocharger'
				url = 'https://github.com/yingzhuo/spring-turbocharger'
				inceptionYear = '2025'

				licenses {
					license {
						name = 'Apache License, Version 2.0'
						url = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
					}
				}

				developers {
					developer {
						id = 'yingzhuo'
						name = '应卓'
						email = 'yingzhor@gmail.com'
						roles = ['author']
						timezone = 'GMT+0800'
						url = 'https://github.com/yingzhuo'
					}
				}

				scm {
					url = 'git@github.com:yingzhuo/spring-turbocharger.git'
					connection = 'scm:git:git@github.com:yingzhuo/spring-turbocharger.git'
					developerConnection = 'scm:git:git@github.com:yingzhuo/spring-turbocharger.git'
				}

				issueManagement {
					system = 'GitHub Issues'
					url = 'https://github.com/yingzhuo/spring-turbocharger/issues'
				}
			}
		}
	}

	repositories {
		maven {
			name = 'OSSRH'
			url = project.version.endsWith('SNAPSHOT') ? "${ossrhSnapshotUrl}" : "${ossrhReleaseUrl}"

			credentials {
				// 私密信息在 $GRADLE_USER_HOME/gradle.properties
				username = "${ossrhTokenUsername}"
				password = "${ossrhTokenPassword}"
			}
		}
	}
}

signing {
	useGpgCmd()
	sign publishing.publications.mavenJava
}

tasks.withType(GenerateModuleMetadata).configureEach {
	enabled = false
}
