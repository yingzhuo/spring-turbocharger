plugins {
	id 'io.spring.dependency-management' version '1.1.7' apply false
}

ext {
	// GradleWrapper版本
	set('gradleWrapperVersion', '8.12.1')

	// 核心框架版本
	set('springBootVersion', '3.4.3')

	// SpringBoot BOM 微调
	// https://docs.spring.io/spring-boot/appendix/dependency-versions/coordinates.html
	// https://docs.spring.io/spring-boot/appendix/dependency-versions/properties.html
	// set('spring-framework.version', '6.2.3')
}

group = 'com.github.yingzhuo'
version = '3.4.3-SNAPSHOT'
description = 'Another enhancement library of SpringBoot & SpringFramework'

tasks.named('wrapper') { task ->
	distributionUrl = "https://mirrors.cloud.tencent.com/gradle/gradle-${gradleWrapperVersion}-bin.zip"
}
