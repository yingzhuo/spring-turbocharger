plugins {
	id 'base'
}

tasks.named('wrapper') { task ->
	var propertyName = 'project.gradle-wrapper.distribution-url'

	var url = providers.gradleProperty(propertyName).getOrNull()
	if (url == null || url.isBlank()) {
		var errorMessage = """
		|配置问题:
		|	${propertyName} 配置缺失
		|请检查:
		|	gradle.properties
		""".stripMargin('|')
			.trim()

		throw new StopExecutionException(errorMessage)
	} else {
		distributionUrl = url
	}
}

tasks.register('addJavaLicenseHeader') { task ->
	group = 'license'
	description = 'Adds a license header for the Java source files'

	var header = file("${rootDir}/build-src/src/main/resources/java_header.txt").text
	if (!header.endsWith("\n")) {
		header += "\n"
	}

	fileTree(rootDir) {
		include '**/*.java'
	}.each { file ->
		def content = file.text
		if (!content.startsWith(header)) {
			file.setText(
				header + content
			)
		}
	}

}
