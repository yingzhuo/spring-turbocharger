plugins {
	id 'java-platform'
	id 'signing'
	id 'maven-publish'
}

dependencies {
	constraints {
		rootProject.findProject('projects-main').subprojects { subproject ->
			var subprojectName = subproject.name
			if (subprojectName.startsWith('spring-turbo-')) {
				api(subproject)
			}
		}

		api(libs.hocon)
		api(libs.bundles.bouncycastle)
		api(libs.bundles.jjwt)
		api(libs.bundles.zxing)
		api(libs.hutool.all)
		api(libs.freemarker)
		api(libs.pinyin4j)
		api(libs.xxljob)
	}
}

publishing {

	publications {
		mavenJava(MavenPublication) {
			from components.javaPlatform

			groupId = 'com.github.yingzhuo'
			artifactId = project.name
			version = project.version

			pom {
				name = "${project.name}"
				description = 'BOM of SpringTurbocharger'
				url = 'https://github.com/yingzhuo/spring-turbocharger'
				inceptionYear = '2025'

				licenses {
					license {
						name = 'Apache License, Version 2.0'
						url = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
					}
				}

				developers {
					developer {
						id = 'yingzhuo'
						name = '应卓'
						email = 'yingzhor@gmail.com'
						roles = ['author']
						url = 'https://github.com/yingzhuo'
					}
				}

				scm {
					url = 'git@github.com:yingzhuo/spring-turbocharger.git'
					connection = 'scm:git:git@github.com:yingzhuo/spring-turbocharger.git'
					developerConnection = 'scm:git:git@github.com:yingzhuo/spring-turbocharger.git'
				}

				issueManagement {
					system = 'GitHub Issues'
					url = 'https://github.com/yingzhuo/spring-turbocharger/issues'
				}
			}
		}
	}

	repositories {
		maven {
			name = 'OSSRH'
			url = project.version.endsWith('SNAPSHOT') ?
				'https://oss.sonatype.org/content/repositories/snapshots/' :
				'https://oss.sonatype.org/service/local/staging/deploy/maven2/'

			credentials {
				// 私密信息在 $GRADLE_USER_HOME/gradle.properties
				username = getPropertyOrEmpty('ossrhTokenUsername')
				password = getPropertyOrEmpty('ossrhTokenPassword')
			}
		}
	}
}

signing {
	useGpgCmd()
	sign publishing.publications.mavenJava
}

tasks.withType(GenerateModuleMetadata).configureEach {
	enabled = false
}

// ---------------------------------------------------------------------------------------------------------------------

private String getPropertyOrEmpty(String propertyName) {
	try {
		var value = getProperty(propertyName).toString()
		return value.trim()
	} catch (MissingPropertyException ignored) {
		return ''
	}
}
