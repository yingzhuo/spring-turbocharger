plugins {
    id 'signing'
    id 'maven-publish'
}

ext {
    set('pomGroupId', 'com.github.yingzhuo')
    set('pomVersion', "${rootProject.version}")
    set('pomArtifactId', "${project.name}")
    set('pomArtifactName', "${project.name}")
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            groupId = "${pomGroupId}"
            artifactId = "${pomArtifactId}"
            version = "${pomVersion}"

            versionMapping {
                usage('java-api') {
                    fromResolutionOf('runtimeClasspath')
                }
                usage('java-runtime') {
                    fromResolutionResult()
                }
            }

            from components.java

            pom {
                name = "${pomArtifactName}"
                description = "another spring-boot tool(s)"
                url = "https://github.com/yingzhuo/spring-turbocharger"
                inceptionYear = '2025'

                licenses {
                    license {
                        name = 'Apache License, Version 2.0'
                        url = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
                    }
                }
                developers {
                    developer {
                        id = 'yingzhuo'
                        name = '应卓'
                        email = 'yingzhor@gmail.com'
                    }
                }
                scm {
                    url = "git@github.com:yingzhuo/spring-turbocharger.git"
                    connection = 'scm:git:git@github.com:yingzhuo/spring-turbocharger.git'
                    developerConnection = 'scm:git:git@github.com:yingzhuo/spring-turbocharger.git'
                }
            }
        }
    }

    repositories {
        maven {
            name = "OSSRH"

            def releaseUrl = 'https://oss.sonatype.org/service/local/staging/deploy/maven2/'
            def snapshotUrl = 'https://oss.sonatype.org/content/repositories/snapshots/'
            url = rootProject.version.endsWith('SNAPSHOT') ? snapshotUrl : releaseUrl

            credentials {
                username = System.getenv("OSSRH_TOKEN_USERNAME")
                password = System.getenv("OSSRH_TOKEN_PASSWORD")
            }
        }
    }
}

signing {
    useGpgCmd()
    sign publishing.publications.mavenJava
}

tasks.withType(GenerateModuleMetadata).configureEach {
    enabled = false
}
