javaVersion=17
kotlinVersion=1.9.25
########################################################################################################################
# Spring Boot Version
########################################################################################################################
springBootVersion=3.4.4-SNAPSHOT
########################################################################################################################
# Gradle Plugin Versions
########################################################################################################################
dependencyManagementPluginVersion=1.1.7
shadowPluginVersion=8.3.6
