plugins {
	id 'java'
	id 'java-library'
	id 'idea'
	id 'io.spring.dependency-management'
}

dependencyManagement {
	imports {
		mavenBom("org.springframework.boot:spring-boot-dependencies:${springBootVersion}") {
			bomProperties([:])
		}
	}
}

java {
	withSourcesJar()
	withJavadocJar()

	sourceCompatibility = JavaVersion.VERSION_17
	targetCompatibility = JavaVersion.VERSION_17

	toolchain {
		languageVersion = JavaLanguageVersion.of(17)
	}
}

compileJava {
	options.compilerArgs += [
		'-parameters',
		'-Xlint:unchecked',
		'-Xlint:cast',
		'-Xlint:rawtypes',
		'-Xlint:overloads',
		'-Xlint:divzero',
		'-Xlint:finally',
		'-Xlint:static',
		// '-Werror',
	]
}

jar {
	manifest {
		attributes([
			'Module-Name'           : "${project.name}",
			'Implementation-Version': "${project.version}",
			'Built-By'              : "Gradle ${gradle.gradleVersion}",
			'Build-Time'            : SharedFunctions.getTimestamp('yyyy-MM-dd HH:mm:ss.SSS')
		])
	}
}

javadoc {
	options.addBooleanOption("html5", true)
	options.addBooleanOption("Xdoclint:none", true)
}

processResources {

	doLast {
		var metaInfoDir = file(layout.buildDirectory.dir('resource/main/META-INF/'))
		SharedFunctions.mkdir(metaInfoDir)

		SharedFunctions.copyFile(
			file("${rootDir}/LICENSE.txt"),
			file(layout.buildDirectory.dir('resources/main/META-INF/LICENSE.txt'))
		)

		SharedFunctions.copyFile(
			file("${rootDir}/NOTICE.txt"),
			file(layout.buildDirectory.dir('resources/main/META-INF/NOTICE.txt'))
		)
	}
}

idea {
	module {
		downloadSources = true
		downloadJavadoc = true
	}
}

test {
	useJUnitPlatform()
}
